version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: retroquest
      POSTGRES_USER: retroquest
      POSTGRES_PASSWORD: retroquest_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retroquest -d retroquest"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      SECRET_KEY: change-me-very-long-random-secret
      DATABASE_URL: postgresql+psycopg2://retroquest:retroquest_change_me@postgres:5432/retroquest
      REDIS_URL: redis://redis:6379/0
      CACHE_TYPE: redis
      CACHE_REDIS_URL: redis://redis:6379/0
      ENABLE_SERVER_SIDE_SESSIONS: "1"
      SESSION_REDIS_URL: redis://redis:6379/1
      GAME_STATE_BACKEND: redis
      GAME_STATE_PREFIX: retroquest:game
      START_BLOCKCHAIN_CHECKER: "0"
      AUTO_CREATE_SCHEMA_ON_START: "0"
      WEB_CONCURRENCY: "8"
      WORKER_CONNECTIONS: "2000"
      DB_POOL_SIZE: "80"
      DB_MAX_OVERFLOW: "120"
    command: ["gunicorn", "--config", "gunicorn.conf.py", "run:app"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/app/static/uploads
    expose:
      - "5000"

  worker:
    build: .
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      SECRET_KEY: change-me-very-long-random-secret
      DATABASE_URL: postgresql+psycopg2://retroquest:retroquest_change_me@postgres:5432/retroquest
      REDIS_URL: redis://redis:6379/0
      CACHE_TYPE: redis
      CACHE_REDIS_URL: redis://redis:6379/0
      ENABLE_SERVER_SIDE_SESSIONS: "1"
      SESSION_REDIS_URL: redis://redis:6379/1
      GAME_STATE_BACKEND: redis
      GAME_STATE_PREFIX: retroquest:game
      START_BLOCKCHAIN_CHECKER: "1"
      AUTO_CREATE_SCHEMA_ON_START: "0"
      DB_POOL_SIZE: "20"
      DB_MAX_OVERFLOW: "20"
    command: ["python", "worker.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/app/static/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/srv/static:ro
      - uploads_data:/srv/static/uploads:ro

volumes:
  postgres_data:
  redis_data:
  uploads_data:
